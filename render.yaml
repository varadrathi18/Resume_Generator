# Render.com Blueprint — Backend + ML deployment
# Docs: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: resumeforge-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: PORT
        value: "10000"
      - key: FLASK_DEBUG
        value: "false"
      - key: GEMINI_MODEL_NAME
        value: "gemini-2.5-flash"
      - key: USE_TRANSFORMER_MODEL
        value: "false"
      # Secrets — must be set manually in Render dashboard
      - key: GEMINI_API_KEY
        sync: false
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET_KEY
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
